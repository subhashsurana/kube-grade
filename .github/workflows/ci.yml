name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
      - name: Lint all shell files
        run: |
          find . -name "*.sh" -print0 | while IFS= read -r -d '' f; do
            echo "→ $f"
            shellcheck -S warning "$f"
          done

  bash-syntax:
    name: Bash syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Parse all shell files
        run: |
          find . -name "*.sh" -print0 | while IFS= read -r -d '' f; do
            echo "→ $f"
            bash -n "$f"
          done

  integration-smoke:
    name: Integration smoke (${{ matrix.script }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        script:
          - tests/recipes-smoke.sh
          - tests/kg-discover-smoke.sh
          - tests/install-smoke.sh
    steps:
      - uses: actions/checkout@v4
      - name: Run ${{ matrix.script }}
        run: bash "${{ matrix.script }}"

  smoke-test:
    name: Library smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Source without errors
        run: bash -c 'source lib/grade-lib.sh && source lib/grade-recipes.sh && echo "OK"'

      - name: All check_ functions declared
        run: |
          source lib/grade-lib.sh
          fns=(check_exists check_namespace check_pod_ready check_status
               check_image check_deploy_image check_label check_selector_label
               check_replicas check_env check_env_from_configmap check_env_from_secret
               check_volume_mount check_secret_key check_service_type check_service_port
               check_service_selector check_service_endpoints check_resources check_probe
               check_pvc check_storageclass check_pv check_priorityclass
               check_rbac check_rolebinding_role check_rolebinding_subject
               check_clusterrole_rule check_clusterrolebinding_role
               check_clusterrolebinding_subject
               check_cronjob check_ingress check_netpol check_file_exists
               check_file_contains check_file_exact check_jsonpath
               grade_summary grade_reset)
          missing=()
          for fn in "${fns[@]}"; do
            declare -f "$fn" &>/dev/null || missing+=("$fn")
          done
          [[ ${#missing[@]} -eq 0 ]] || { echo "MISSING: ${missing[*]}"; exit 1; }
          echo "All ${#fns[@]} functions present"

      - name: All recipe_ functions declared
        run: |
          source lib/grade-lib.sh
          source lib/grade-recipes.sh
          fns=(recipe_deployment_service recipe_deployment_service_ingress
               recipe_configmap_secret_env recipe_pvc_pod
               recipe_storageclass_pvc recipe_cronjob_advanced
               recipe_rbac_namespace recipe_rbac_cluster
               recipe_priorityclass_pod recipe_pv_pvc)
          missing=()
          for fn in "${fns[@]}"; do
            declare -f "$fn" &>/dev/null || missing+=("$fn")
          done
          [[ ${#missing[@]} -eq 0 ]] || { echo "MISSING: ${missing[*]}"; exit 1; }
          echo "All ${#fns[@]} recipes present"

      - name: grade_summary exits non-zero on failures
        run: |
          source lib/grade-lib.sh
          _fail "test"
          grade_summary && exit 1 || echo "Correct non-zero exit"

      - name: grade_summary exits zero when all pass
        run: |
          source lib/grade-lib.sh
          _pass "test"
          grade_summary || exit 1

      - name: VERSION file present and semver-shaped
        run: |
          [[ -f VERSION ]] || { echo "VERSION missing"; exit 1; }
          grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' VERSION || { echo "Bad version: $(cat VERSION)"; exit 1; }
          echo "Version: $(cat VERSION)"

      - name: All MANIFEST files reference existing scenario files
        run: |
          fail=0
          for manifest in ckad/MANIFEST cka/MANIFEST cks/MANIFEST; do
            exam=$(dirname "$manifest")
            while IFS= read -r f; do
              [[ -z "$f" || "$f" == \#* ]] && continue
              path="$exam/scenarios/$f"
              [[ -f "$path" ]] || { echo "MISSING: $path (listed in $manifest)"; fail=1; }
            done < "$manifest"
          done
          [[ $fail -eq 0 ]] || exit 1
          echo "All MANIFEST entries have matching files"
